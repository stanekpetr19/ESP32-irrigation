substitutions:
  device_name: irrigation-relay-test
  friendly_name: "Irrigation Relay Test"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "First ESPHome firmware for ESP32 relay irrigation board"

  on_boot:
    priority: 800
    then:
      - logger.log: "Boot: forcing all relays OFF"
      - switch.turn_off: relay_1
      - switch.turn_off: relay_2
      - switch.turn_off: relay_3
      - switch.turn_off: relay_4
      - switch.turn_off: relay_5
      - switch.turn_off: relay_6
      - switch.turn_off: relay_7
      - switch.turn_off: relay_8

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  num_attempts: 5
  reboot_timeout: 10min

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3

mdns:

button:
  - platform: restart
    name: "${friendly_name} Restart"

  - platform: safe_mode
    name: "${friendly_name} Restart in Safe Mode"

binary_sensor:
  - platform: gpio
    id: rescue_jumper_gpio23
    name: "${friendly_name} Rescue Jumper GPIO23"
    pin:
      number: GPIO23
      mode:
        input: true
        pullup: true
      inverted: true
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} Connected SSID"

switch:
  - platform: gpio
    name: "${friendly_name} Relay 1 GPIO32"
    id: relay_1
    pin: GPIO32
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 2 GPIO33"
    id: relay_2
    pin: GPIO33
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 3 GPIO25"
    id: relay_3
    pin: GPIO25
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 4 GPIO26"
    id: relay_4
    pin: GPIO26
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 5 GPIO27"
    id: relay_5
    pin: GPIO27
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 6 GPIO12"
    id: relay_6
    pin: GPIO14
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 7 GPIO13"
    id: relay_7
    pin: 
      number: GPIO12
      ignore_strapping_warning: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    name: "${friendly_name} Relay 8 GPIO14"
    id: relay_8
    pin: GPIO13
    restore_mode: ALWAYS_OFF